apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: dojos.core.jutsu.com
spec:
  group: core.jutsu.com
  names:
    categories:
    - all
    kind: Dojo
    listKind: DojoList
    plural: dojos
    shortNames:
    - dj
    singular: dojo
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.readyStatus
      name: READY
      type: string
    - jsonPath: .status.updatedReplicas
      name: UP-TO-DATE
      type: integer
    - jsonPath: .status.availableReplicas
      name: AVAILABLE
      type: integer
    - jsonPath: .spec.accountId
      name: ACCOUNT
      type: string
    - jsonPath: .spec.storage
      name: STORAGE
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: Dojo is the Schema for the dojos API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Dojo
            properties:
              accountId:
                description: AccountId which owns the Dojo application.
                type: string
              credentialsRef:
                description: |-
                  CredentialsRef is a reference to Secret which contains the database credentials.
                  Postgres: Reference the Secret which points to the `owner` of cnpg.Database.
                  Mongo: Not yet supported.
                properties:
                  name:
                    description: name is unique within a namespace to reference a
                      secret resource.
                    type: string
                  namespace:
                    description: namespace defines the space within which the secret
                      name must be unique.
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              database:
                default: Postgres
                description: Database type for the application.
                enum:
                - Postgres
                - Mongo
                type: string
              replicas:
                default: 1
                description: Replicas is number of application instances to run.
                format: int32
                minimum: 0
                type: integer
              title:
                description: Title of the Dojo application.
                type: string
            required:
            - accountId
            - credentialsRef
            - database
            - title
            type: object
          status:
            description: status defines the observed state of Dojo
            properties:
              availableReplicas:
                description: |-
                  AvailableReplicas is the number of Pods created by the Deployment that have been
                  ready for at least minReadySeconds.
                format: int32
                type: integer
              conditions:
                description: |-
                  Conditions represent the current state of the Dojo resource.

                  Standard condition types include:
                  - "Available": the resource is fully functional
                  - "Progressing": the resource is being created or updated
                  - "Degraded": the resource failed to reach or maintain its desired state

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              credentials:
                description: Credentials represents the Secret that is created for
                  database credentials
                properties:
                  name:
                    description: name is unique within a namespace to reference a
                      secret resource.
                    type: string
                  namespace:
                    description: namespace defines the space within which the secret
                      name must be unique.
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              readyReplicas:
                description: ReadyReplicas is the number of Pods created by the Deployment
                  that have the Ready condition.
                format: int32
                type: integer
              readyStatus:
                description: |-
                  ReadyStatus is a human-readable string representing the ratio of ready replicas
                  to desired replicas (e.g., "1/3"). This is used primarily for display in kubectl.
                type: string
              selector:
                description: |-
                  Selector is required for HPA to work with CRDs.
                  It must be the string representation of the label selector.
                type: string
              updatedReplicas:
                description: |-
                  UpdatedReplicas is the number of Pods created by the Deployment that are running the
                  most recent version of the Pod template.
                format: int32
                type: integer
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      scale:
        labelSelectorPath: .status.selector
        specReplicasPath: .spec.replicas
        statusReplicasPath: .status.readyReplicas
      status: {}
